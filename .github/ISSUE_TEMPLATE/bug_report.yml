name: Bug report
description: Report a defect or unexpected behavior
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version or commit
  - type: input
    id: browser
    attributes:
      label: Browser and OS
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
